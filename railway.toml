# Railway automatically reads this file to configure the deployment
[build]
builder = "NIXPACKS"

[deploy]
startCommand = "python bot.py"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Railway will install ffmpeg via nixpacks automatically
# because of the Nixpacks config below

[build.nixpacksPlan]
providers = ["python"]

[build.nixpacksPlan.phases.setup]
nixPkgs = ["ffmpeg"]
